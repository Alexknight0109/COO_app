name: almed_ops
description: ALMED OPS Control System - Universal internal operating system for all employees
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Material Design 3
  material_design_icons_flutter: ^7.0.7296
  
  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  
  # UI & Navigation
  go_router: ^13.0.0
  flutter_animate: ^4.3.0
  
  # API & Network
  http: ^1.2.0
  dio: ^5.4.0
  socket_io_client: ^2.0.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  cached_network_image: ^3.3.1
  
  # Drag and Drop
  flutter_reorderable_list: ^1.3.1
  
  # Charts & Visualization
  fl_chart: ^0.66.0
  
  # Calendar
  table_calendar: ^3.0.9
  
  # File Handling
  file_picker: ^6.1.1
  image_picker: ^1.0.5
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

